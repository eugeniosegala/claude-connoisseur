name: Version Bump

on:
  push:
    branches: [main]
    paths-ignore:
      - "package.json"
      - "package-lock.json"
      - ".claude-plugin/plugin.json"
      - ".claude-plugin/marketplace.json"

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Bump version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          NEW_VERSION=$(npm version patch --no-git-tag-version)

          node -e "
            const fs = require('fs');
            const ver = '${NEW_VERSION}'.replace('v', '');

            const plugin = JSON.parse(fs.readFileSync('.claude-plugin/plugin.json', 'utf8'));
            plugin.version = ver;
            fs.writeFileSync('.claude-plugin/plugin.json', JSON.stringify(plugin, null, 2) + '\n');

            const marketplace = JSON.parse(fs.readFileSync('.claude-plugin/marketplace.json', 'utf8'));
            marketplace.plugins[0].version = ver;
            fs.writeFileSync('.claude-plugin/marketplace.json', JSON.stringify(marketplace, null, 2) + '\n');
          "

          git add package.json package-lock.json .claude-plugin/plugin.json .claude-plugin/marketplace.json
          git commit -m "chore: bump version to ${NEW_VERSION}"
          git tag "${NEW_VERSION}"
          git push origin main --tags
